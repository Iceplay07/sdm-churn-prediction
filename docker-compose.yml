services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: sdm-churn-backend:latest
    container_name: sdm-churn-backend
    ports:
      - "8000:8000"
    environment:
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173,http://localhost:8080"
    volumes:
      # Read-only монтирование, чтобы хот-апдейт модели не требовал пересборки
      - ./model:/app/model:ro
      - ./data:/app/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s

