server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA-роутинг — все ненайденные пути возвращают index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэшируем статику кроме index.html
    location ~* \.(js|svg|png|jpg|css)$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
